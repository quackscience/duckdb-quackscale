# QuackTail + Headscale — headscale, quacktail-server, quacktail-client (+ optional tailscale-probe).
# If you see bootstrap or wait-tailnet containers, reset: git pull && docker compose down --remove-orphans -v
#
#   cd examples
#   docker compose up -d headscale quacktail-server
#   docker compose --profile test run --rm quacktail-client
#
# Vanilla Tailscale probe (no DuckDB — isolates tailnet vs tsnet-in-DuckDB):
#   docker compose --profile debug run --rm tailscale-probe
#
# One-liner:
#   docker compose up -d headscale quacktail-server && \
#   docker compose --profile test run --rm quacktail-client

name: quacktail-demo

x-env: &env
  QUACK_PORT: "9494"
  QUACK_FORWARD_LOCAL_PORT: "19494"
  QUACK_TAILNET_TOKEN: ${QUACK_TAILNET_TOKEN:-quackscale-demo-token}
  QUACKTAIL_QUIET: "1"
  QUACKTAIL_DEMO_TIMEOUT_SEC: "90"
  QUACKTAIL_CLIENT_ATTEMPTS: "15"
  QUACKTAIL_CLIENT_POLL_SEC: "2"
  QUACKTAIL_WAIT_ATTEMPTS: "15"
  QUACKTAIL_WAIT_POLL_SEC: "1"
  HEADSCALE_CONTROL_URL: http://headscale:8080
  HEADSCALE_USER: ${HEADSCALE_USER:-quackscale-demo}
  SERVER_HOST: quacktail-server
  CLIENT_HOST: quacktail-client
  DUCKDB_EXTENSION_DIRECTORY: /duckdb_extensions
  QUACKTAIL_ENABLE_DUCKLAKE: ${QUACKTAIL_ENABLE_DUCKLAKE:-1}
  QUACKTAIL_LAKE_NAME: ${QUACKTAIL_LAKE_NAME:-lake}
  QUACKTAIL_LAKE_METADATA: ${QUACKTAIL_LAKE_METADATA:-/var/lib/ducklake/metadata/inventory.ducklake}
  QUACKTAIL_LAKE_DATA_PATH: ${QUACKTAIL_LAKE_DATA_PATH:-/var/lib/ducklake/data}

x-headscale-volumes: &headscale_volumes
  configs:
    - source: headscale_config
      target: /etc/headscale/config.yaml
    - source: headscale_policy
      target: /etc/headscale/policy.hujson
  volumes:
    - headscale-data:/var/lib/headscale
    - headscale-run:/var/run/headscale

x-quacktail: &quacktail
  build:
    context: ..
    dockerfile: examples/Dockerfile
    args:
      BUILD_FROM_SOURCE: ${BUILD_FROM_SOURCE:-1}
      GITHUB_REPO: ${GITHUB_REPO:-quackscience/duckdb-quackscale}
      QUACKTAIL_RELEASE_TAG: ${QUACKTAIL_RELEASE_TAG:-v1.0.2}
  cap_add: [NET_ADMIN]
  devices: [/dev/net/tun]
  <<: *headscale_volumes
  volumes:
    - quacktail-work:/work
    - headscale-data:/var/lib/headscale
    - headscale-run:/var/run/headscale
  environment:
    <<: *env
    QUACKTAIL_WORK: /work
  networks: [quacktail]

configs:
  headscale_config:
    content: |
      server_url: http://headscale:8080
      listen_addr: 0.0.0.0:8080
      metrics_listen_addr: 127.0.0.1:9090
      grpc_listen_addr: 0.0.0.0:50443
      grpc_allow_insecure: true
      noise:
        private_key_path: /var/lib/headscale/noise_private.key
      prefixes:
        v4: 100.64.0.0/10
        v6: fd7a:115c:a1e0::/48
      derp:
        # Embedded DERP requires server_url https:// (headscale 0.28 config-example.yaml).
        # Lab uses http://headscale:8080 — rely on Tailscale public DERP relays instead.
        server:
          enabled: false
        urls:
          - https://controlplane.tailscale.com/derpmap/default
        paths: []
        auto_update_enabled: true
      disable_check_updates: true
      database:
        type: sqlite
        sqlite:
          path: /var/lib/headscale/db.sqlite
          write_ahead_log: true
      log:
        level: info
      policy:
        mode: file
        path: /etc/headscale/policy.hujson
      dns:
        magic_dns: true
        base_domain: quackscale.test
        override_local_dns: true
        nameservers:
          global: [1.1.1.1, 1.0.0.1]
        extra_records: []
      logtail:
        enabled: false
      unix_socket: /var/run/headscale/headscale.sock
      unix_socket_permission: "0777"
  headscale_policy:
    content: |
      {"acls":[{"action":"accept","src":["*"],"dst":["*:*"]}]}

services:
  headscale:
    image: headscale/headscale:0.28.0
    <<: *headscale_volumes
    command: serve
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: [CMD, headscale, health]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      quacktail:
        aliases: [headscale]

  quacktail-server:
    <<: *quacktail
    container_name: quacktail-server
    depends_on:
      headscale:
        condition: service_healthy
    volumes:
      - quacktail-work:/work
      - ducklake-lake:/var/lib/ducklake
      - headscale-data:/var/lib/headscale
      - headscale-run:/var/run/headscale
    environment:
      <<: *env
      QUACKTAIL_WORK: /work
      QUACKTAIL_ROLE: server
      QUACKTAIL_AUTO_BOOTSTRAP: "1"
      HEADSCALE_CONFIG: /etc/headscale/config.yaml
    healthcheck:
      test: [CMD, /usr/local/bin/quacktail-server-healthcheck.sh]
      interval: 3s
      timeout: 3s
      retries: 40
      start_period: 15s
    networks:
      quacktail:
        aliases: [quacktail-server]
    restart: unless-stopped

  quacktail-client:
    <<: *quacktail
    profiles: [test]
    depends_on:
      quacktail-server:
        condition: service_healthy
    environment:
      <<: *env
      QUACKTAIL_WORK: /work
      QUACKTAIL_ROLE: client
      QUACKTAIL_WAIT_SERVER: quacktail-server
      HEADSCALE_CONFIG: /etc/headscale/config.yaml
    restart: "no"

  tailscale-probe:
    build:
      context: ..
      dockerfile: examples/Dockerfile.tailscale-probe
    profiles: [debug]
    cap_add: [NET_ADMIN]
    devices: [/dev/net/tun]
    depends_on:
      quacktail-server:
        condition: service_healthy
    environment:
      <<: *env
      QUACKTAIL_WORK: /work
      TAILSCALE_PROBE_HOSTNAME: tailscale-probe
    volumes:
      - quacktail-work:/work
    networks: [quacktail]
    restart: "no"

volumes:
  headscale-data:
  headscale-run:
  quacktail-work:
  ducklake-lake:

networks:
  quacktail:
    name: quacktail-demo

# CI config — control plane at http://headscale:8080; MagicDNS for tailnet peer hostnames.

server_url: http://headscale:8080
listen_addr: 0.0.0.0:8080
metrics_listen_addr: 127.0.0.1:9090
grpc_listen_addr: 0.0.0.0:50443
grpc_allow_insecure: true

noise:
  private_key_path: /var/lib/headscale/noise_private.key

prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48

derp:
  server:
    enabled: false
  urls:
    - https://controlplane.tailscale.com/derpmap/default
  paths: []
  auto_update_enabled: true

disable_check_updates: true

database:
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite
    write_ahead_log: true

log:
  level: info

policy:
  mode: file
  path: /etc/headscale/policy.hujson

dns:
  # MagicDNS: hostname.base_domain for nodes (see https://headscale.net/stable/ref/dns/).
  # DuckDB/tsnet has no accept-dns C API yet — e2e clients ATTACH via tailnet IP.
  # extra_records can add static A records; dynamic peers use headscale_ci_write_extra_records.
  magic_dns: true
  base_domain: quackscale-ci.test
  override_local_dns: true
  nameservers:
    global:
      - 1.1.1.1
      - 1.0.0.1
  extra_records: []

logtail:
  enabled: false

unix_socket: /var/run/headscale/headscale.sock
unix_socket_permission: "0770"

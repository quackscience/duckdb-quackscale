# Join QuackScale to Headscale (build from source on PR).
name: Headscale integration

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/headscale-integration.yml'
      - 'scripts/ci_headscale_smoke.sh'
      - 'scripts/lib/headscale_ci.sh'
      - 'test/headscale/**'
      - 'src/**'
      - 'cmake/**'
      - 'third_party/libtailscale/**'

env:
  HEADSCALE_HOST: headscale
  HEADSCALE_CONTROL_URL: http://headscale:8080

jobs:
  headscale-smoke:
    name: Headscale + QuackScale smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build ccache curl

      - name: Start Headscale
        run: |
          chmod +x scripts/lib/headscale_ci.sh
          export HEADSCALE_CI_ROOT="$GITHUB_WORKSPACE"
          export HEADSCALE_DATA_DIR="$RUNNER_TEMP/headscale-data"
          # shellcheck source=scripts/lib/headscale_ci.sh
          source scripts/lib/headscale_ci.sh
          headscale_ci_start "$HEADSCALE_DATA_DIR"

      - name: Build QuackScale
        run: GEN=ninja make release

      - name: Run Headscale smoke test
        env:
          HEADSCALE_ALREADY_RUNNING: "1"
        run: |
          chmod +x scripts/ci_headscale_smoke.sh scripts/lib/headscale_ci.sh
          ./scripts/ci_headscale_smoke.sh

      - name: Stop Headscale
        if: always()
        run: |
          export HEADSCALE_CI_ROOT="$GITHUB_WORKSPACE"
          # shellcheck source=scripts/lib/headscale_ci.sh
          source scripts/lib/headscale_ci.sh
          headscale_ci_stop

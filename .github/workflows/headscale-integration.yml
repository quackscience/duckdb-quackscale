# Join a real Headscale control server (Tailscale-compatible) from QuackScale.
# https://github.com/juanfont/headscale
name: Headscale integration

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/headscale-integration.yml'
      - 'scripts/ci_headscale_smoke.sh'
      - 'test/headscale/**'
      - 'src/**'
      - 'cmake/**'
      - 'third_party/libtailscale/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/headscale-integration.yml'
      - 'scripts/ci_headscale_smoke.sh'
      - 'test/headscale/**'
      - 'src/**'
      - 'cmake/**'

jobs:
  headscale-smoke:
    name: Headscale + QuackScale smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build ccache curl

      - name: Build QuackScale
        run: GEN=ninja make release

      - name: Run Headscale smoke test
        run: |
          chmod +x scripts/ci_headscale_smoke.sh
          ./scripts/ci_headscale_smoke.sh

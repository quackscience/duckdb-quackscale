# Two-node QuackTail e2e over Headscale (builds quackscale from source; needs tailscale_serve_local).
name: Headscale QuackTail e2e

on:
  workflow_dispatch:

env:
  HEADSCALE_HOST: headscale
  HEADSCALE_CONTROL_URL: http://headscale:8080
  HEADSCALE_MAGICDNS_BASE_DOMAIN: quackscale-ci.test

jobs:
  quacktail-e2e:
    name: Headscale QuackTail e2e (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build ccache curl

      - name: Build QuackScale DuckDB
        run: |
          GEN=ninja make release
          echo "DUCKDB=$GITHUB_WORKSPACE/build/release/duckdb" >> "$GITHUB_ENV"
          "$DUCKDB" -version || "$DUCKDB" --version
          "$DUCKDB" :memory: -csv -c \
            "SELECT extension_name, loaded FROM duckdb_extensions() WHERE extension_name='quackscale';"

      - name: Start Headscale
        run: |
          chmod +x scripts/lib/headscale_ci.sh
          export HEADSCALE_CI_ROOT="$GITHUB_WORKSPACE"
          export HEADSCALE_DATA_DIR="$RUNNER_TEMP/headscale-data"
          # shellcheck source=scripts/lib/headscale_ci.sh
          source scripts/lib/headscale_ci.sh
          headscale_ci_start "$HEADSCALE_DATA_DIR"

      - name: Verify Headscale
        run: |
          export HEADSCALE_CI_ROOT="$GITHUB_WORKSPACE"
          # shellcheck source=scripts/lib/headscale_ci.sh
          source scripts/lib/headscale_ci.sh
          curl -v "$HEADSCALE_CONTROL_URL/health"
          AUTHKEY="$(headscale_ci_create_authkey)"
          echo "authkey_len=${#AUTHKEY}"
          headscale_ci_verify_tailscale_client "$AUTHKEY" "gha-headscale-smoke"
          echo "$AUTHKEY" > "$RUNNER_TEMP/headscale-authkey"
          chmod 600 "$RUNNER_TEMP/headscale-authkey"

      - name: Install quack extension
        run: |
          if ! "$DUCKDB" :memory: -batch -c "LOAD quack; SELECT 1;"; then
            "$DUCKDB" :memory: -batch -c "INSTALL quack FROM core; LOAD quack; SELECT 1;" \
              || "$DUCKDB" :memory: -batch -c "INSTALL quack FROM core_nightly; LOAD quack; SELECT 1;"
          fi

      - name: Run Headscale QuackTail e2e
        env:
          HEADSCALE_AUTHKEY_FILE: ${{ runner.temp }}/headscale-authkey
          SKIP_HEADSCALE_VERIFY: "1"
          HEADSCALE_ALREADY_RUNNING: "1"
        run: |
          chmod +x scripts/ci_headscale_e2e.sh scripts/lib/headscale_ci.sh scripts/lib/quacktail_ci.sh scripts/e2e/quacktail-entrypoint.sh
          ./scripts/ci_headscale_e2e.sh

      - name: Stop Headscale
        if: always()
        run: |
          export HEADSCALE_CI_ROOT="$GITHUB_WORKSPACE"
          export QUACKTAIL_CI_ROOT="$GITHUB_WORKSPACE"
          # shellcheck source=scripts/lib/quacktail_ci.sh
          source scripts/lib/quacktail_ci.sh
          quacktail_ci_stop
          # shellcheck source=scripts/lib/headscale_ci.sh
          source scripts/lib/headscale_ci.sh
          headscale_ci_stop

      - name: Upload e2e logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: headscale-e2e-logs
          path: .e2e-work/
          if-no-files-found: warn

# QuackTail e2e over Headscale — manual only; uses docker-compose + release binary (no source build).
name: Headscale QuackTail e2e

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'GitHub release tag (use "latest" for newest release)'
        required: false
        default: v1.0.3
        type: string

env:
  QUACKTAIL_RELEASE_TAG_DEFAULT: v1.0.3
  BUILD_FROM_SOURCE: "0"
  QUACKTAIL_ENABLE_DUCKLAKE: "0"
  QUACKTAIL_REQUIRE_ATTACH_DUCKLAKE: "0"

jobs:
  quacktail-e2e:
    name: QuackTail e2e (compose + release binary)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run QuackTail compose e2e
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          echo "Git commit: $(git rev-parse HEAD)"
          grep -q 'docker compose build quacktail-server' scripts/ci_headscale_e2e.sh \
            || { echo "error: ci_headscale_e2e.sh must use docker compose (not legacy quacktail-ci containers)" >&2; exit 1; }
          export QUACKTAIL_RELEASE_TAG="${INPUT_RELEASE_TAG:-${QUACKTAIL_RELEASE_TAG_DEFAULT}}"
          echo "Release tag: ${QUACKTAIL_RELEASE_TAG}"
          chmod +x scripts/ci_headscale_e2e.sh
          ./scripts/ci_headscale_e2e.sh

      - name: Upload e2e logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quacktail-e2e-logs
          path: .e2e-work/
          if-no-files-found: warn

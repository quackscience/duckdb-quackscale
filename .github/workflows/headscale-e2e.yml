# QuackTail e2e — same flow as examples/README.md (source-built compose demo).
name: Headscale QuackTail e2e

on:
  workflow_dispatch:

env:
  COMPOSE_PROJECT_NAME: quacktail-ci

jobs:
  compose-e2e:
    name: Compose e2e (Headscale + DuckLake + Quack)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run compose e2e
        run: |
          chmod +x scripts/ci_compose_e2e.sh
          ./scripts/ci_compose_e2e.sh

      - name: Collect compose logs on failure
        if: failure()
        working-directory: examples
        run: |
          docker compose ps -a || true
          docker compose logs --no-color > "${RUNNER_TEMP}/compose-logs.txt" 2>&1 || true
          docker compose exec -T quacktail-server tail -100 /work/server.log 2>/dev/null \
            > "${RUNNER_TEMP}/server.log" || true
          docker compose run --rm --entrypoint tail quacktail-client -100 /work/client.out 2>/dev/null \
            > "${RUNNER_TEMP}/client.out" || true

      - name: Upload e2e artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quacktail-compose-e2e-logs
          path: |
            ${{ runner.temp }}/quacktail-compose-e2e.log
            ${{ runner.temp }}/compose-logs.txt
            ${{ runner.temp }}/server.log
            ${{ runner.temp }}/client.out
          if-no-files-found: warn

      - name: Teardown
        if: always()
        working-directory: examples
        run: docker compose --profile test down --remove-orphans -v || true

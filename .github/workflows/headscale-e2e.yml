# Two-node QuackTail e2e over Headscale. Manual only — uses pre-built release binaries.
name: Headscale QuackTail e2e

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'GitHub release tag (leave empty for latest)'
        required: false
        default: latest
        type: string

env:
  HEADSCALE_HOST: headscale
  HEADSCALE_CONTROL_URL: http://headscale:8080
  HEADSCALE_MAGICDNS_BASE_DOMAIN: quackscale-ci.test

jobs:
  quacktail-e2e:
    name: Headscale QuackTail e2e (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Start Headscale
        run: |
          chmod +x scripts/lib/headscale_ci.sh
          export HEADSCALE_CI_ROOT="$GITHUB_WORKSPACE"
          export HEADSCALE_DATA_DIR="$RUNNER_TEMP/headscale-data"
          # shellcheck source=scripts/lib/headscale_ci.sh
          source scripts/lib/headscale_ci.sh
          headscale_ci_start "$HEADSCALE_DATA_DIR"

      - name: Verify Headscale
        run: |
          export HEADSCALE_CI_ROOT="$GITHUB_WORKSPACE"
          # shellcheck source=scripts/lib/headscale_ci.sh
          source scripts/lib/headscale_ci.sh
          curl -v "$HEADSCALE_CONTROL_URL/health"
          AUTHKEY="$(headscale_ci_create_authkey)"
          echo "authkey_len=${#AUTHKEY}"
          headscale_ci_verify_tailscale_client "$AUTHKEY" "gha-headscale-smoke"
          echo "$AUTHKEY" > "$RUNNER_TEMP/headscale-authkey"
          chmod 600 "$RUNNER_TEMP/headscale-authkey"

      - name: Download QuackTail release binary
        run: |
          chmod +x scripts/ci_download_release_duckdb.sh
          eval "$(./scripts/ci_download_release_duckdb.sh "${{ inputs.release_tag }}")"
          echo "DUCKDB=$DUCKDB" >> "$GITHUB_ENV"
          "$DUCKDB" -version || "$DUCKDB" --version
          echo "=== quackscale (built-in) ==="
          "$DUCKDB" :memory: -csv -c \
            "SELECT extension_name, loaded, install_path FROM duckdb_extensions() WHERE extension_name='quackscale';"
          echo "=== tailscale_serve_local ==="
          "$DUCKDB" :memory: -csv -c \
            "SELECT function_name FROM duckdb_functions() WHERE function_name='tailscale_serve_local';"
          echo "=== tailscale_status ==="
          "$DUCKDB" :memory: -batch -echo -c "CALL tailscale_status();"

      - name: DuckDB tailscale_up smoke
        run: |
          AUTHKEY="$(cat "$RUNNER_TEMP/headscale-authkey")"
          STATE="$RUNNER_TEMP/duckdb-tailscale-smoke"
          rm -rf "$STATE"
          mkdir -p "$STATE"
          export HEADSCALE_CI_ROOT="$GITHUB_WORKSPACE"
          # shellcheck source=scripts/lib/headscale_ci.sh
          source scripts/lib/headscale_ci.sh
          {
            headscale_ci_sql_tailscale_up "gha-duckdb-smoke" "$STATE" "$AUTHKEY"
            echo "CALL tailscale_status();"
          } > "$RUNNER_TEMP/tailscale_smoke.sql"
          echo "=== DuckDB tailscale_up smoke ==="
          echo "--- SQL ---"
          cat "$RUNNER_TEMP/tailscale_smoke.sql"
          echo "--- DuckDB output ---"
          "$DUCKDB" :memory: -batch -echo -f "$RUNNER_TEMP/tailscale_smoke.sql"
          echo "=== Headscale nodes after smoke ==="
          headscale_ci_exec headscale nodes list || true

      - name: Install quack extension
        run: |
          set -euo pipefail
          EXT_DIR="$RUNNER_TEMP/duckdb_extensions"
          mkdir -p "$EXT_DIR"
          echo "DUCKDB_EXTENSION_DIRECTORY=$EXT_DIR" >> "$GITHUB_ENV"
          export DUCKDB_EXTENSION_DIRECTORY="$EXT_DIR"
          SET_EXT="SET extension_directory='${EXT_DIR}';"
          if ! "$DUCKDB" :memory: -batch -c "${SET_EXT} LOAD quack; SELECT 1;"; then
            "$DUCKDB" :memory: -batch -c "${SET_EXT} INSTALL quack FROM core; LOAD quack; SELECT 1;" \
              || "$DUCKDB" :memory: -batch -c "${SET_EXT} INSTALL quack FROM core_nightly; LOAD quack; SELECT 1;"
          fi
          loaded="$("$DUCKDB" :memory: -batch -csv -noheader -c \
            "${SET_EXT} LOAD quack; SELECT loaded FROM duckdb_extensions() WHERE extension_name='quack';" \
            | tail -1 | tr -d '[:space:]')"
          if [[ "$loaded" != "true" ]]; then
            echo "error: quack failed to load (loaded=$loaded)" >&2
            exit 1
          fi
          "$DUCKDB" :memory: -batch -echo -c "
            ${SET_EXT}
            LOAD quack;
            SELECT extension_name, loaded, install_path
            FROM duckdb_extensions()
            WHERE extension_name='quack';
          "

      - name: Run Headscale QuackTail e2e
        env:
          HEADSCALE_AUTHKEY_FILE: ${{ runner.temp }}/headscale-authkey
          SKIP_HEADSCALE_VERIFY: "1"
          HEADSCALE_ALREADY_RUNNING: "1"
          DUCKDB_EXTENSION_DIRECTORY: ${{ runner.temp }}/duckdb_extensions
        run: |
          set -euo pipefail
          chmod +x scripts/ci_headscale_e2e.sh scripts/lib/headscale_ci.sh scripts/lib/quacktail_ci.sh scripts/e2e/quacktail-entrypoint.sh
          export DUCKDB_EXTENSION_DIRECTORY="$DUCKDB_EXTENSION_DIRECTORY"
          SET_EXT="SET extension_directory='${DUCKDB_EXTENSION_DIRECTORY}';"
          "$DUCKDB" :memory: -batch -echo -c "${SET_EXT} LOAD quack; SELECT 1;"
          ./scripts/ci_headscale_e2e.sh

      - name: Stop Headscale
        if: always()
        run: |
          export HEADSCALE_CI_ROOT="$GITHUB_WORKSPACE"
          export QUACKTAIL_CI_ROOT="$GITHUB_WORKSPACE"
          # shellcheck source=scripts/lib/quacktail_ci.sh
          source scripts/lib/quacktail_ci.sh
          quacktail_ci_stop
          # shellcheck source=scripts/lib/headscale_ci.sh
          source scripts/lib/headscale_ci.sh
          headscale_ci_stop

      - name: Upload e2e logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: headscale-e2e-logs
          path: .e2e-work/
          if-no-files-found: warn

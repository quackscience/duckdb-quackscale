# Two-node QuackTail e2e over Headscale. Builds DuckDB + quackscale from source.
name: Headscale QuackTail e2e

on:
  workflow_dispatch:

env:
  HEADSCALE_HOST: headscale
  HEADSCALE_CONTROL_URL: http://headscale:8080

jobs:
  quacktail-e2e:
    name: Headscale QuackTail e2e (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build ccache curl

      - name: Start Headscale
        run: |
          chmod +x scripts/lib/headscale_ci.sh
          export HEADSCALE_CI_ROOT="$GITHUB_WORKSPACE"
          export HEADSCALE_DATA_DIR="$RUNNER_TEMP/headscale-data"
          # shellcheck source=scripts/lib/headscale_ci.sh
          source scripts/lib/headscale_ci.sh
          headscale_ci_start "$HEADSCALE_DATA_DIR"

      - name: Verify Headscale
        run: |
          export HEADSCALE_CI_ROOT="$GITHUB_WORKSPACE"
          # shellcheck source=scripts/lib/headscale_ci.sh
          source scripts/lib/headscale_ci.sh
          curl -v "$HEADSCALE_CONTROL_URL/health"
          AUTHKEY="$(headscale_ci_create_authkey)"
          echo "authkey_len=${#AUTHKEY}"
          headscale_ci_verify_tailscale_client "$AUTHKEY" "gha-headscale-smoke"
          echo "$AUTHKEY" > "$RUNNER_TEMP/headscale-authkey"
          chmod 600 "$RUNNER_TEMP/headscale-authkey"

      - name: Build DuckDB + quackscale
        run: GEN=ninja make release

      - name: Verify DuckDB build
        run: |
          DUCKDB="$GITHUB_WORKSPACE/build/release/duckdb"
          echo "DUCKDB=$DUCKDB" >> "$GITHUB_ENV"
          "$DUCKDB" -version || "$DUCKDB" --version
          echo "=== quackscale (linked) ==="
          "$DUCKDB" :memory: -csv -c \
            "SELECT extension_name, loaded, install_path FROM duckdb_extensions() WHERE extension_name='quackscale';"
          echo "=== tailscale_status ==="
          "$DUCKDB" :memory: -batch -echo -c "CALL tailscale_status();"

      - name: Install quack extension
        run: |
          echo "=== LOAD quack ==="
          if ! "$DUCKDB" :memory: -batch -echo -c "LOAD quack; SELECT 'quack_loaded' AS status;"; then
            echo "Installing quack from DuckDB core ..."
            "$DUCKDB" :memory: -batch -echo -c "INSTALL quack FROM core; LOAD quack; SELECT 'quack_installed' AS status;" \
              || "$DUCKDB" :memory: -batch -echo -c "INSTALL quack FROM core_nightly; LOAD quack; SELECT 'quack_installed_nightly' AS status;"
          fi

      - name: DuckDB tailscale_up smoke
        run: |
          AUTHKEY="$(cat "$RUNNER_TEMP/headscale-authkey")"
          STATE="$RUNNER_TEMP/duckdb-tailscale-smoke"
          rm -rf "$STATE"
          mkdir -p "$STATE"
          cat > "$RUNNER_TEMP/tailscale_smoke.sql" <<SQL
          CALL tailscale_up(
              hostname => 'gha-duckdb-smoke',
              control_url => '${HEADSCALE_CONTROL_URL}',
              authkey => '${AUTHKEY}',
              state_dir => '${STATE}',
              ephemeral => true
          );
          CALL tailscale_status();
          SQL
          echo "=== DuckDB tailscale_up smoke ==="
          echo "--- SQL ---"
          cat "$RUNNER_TEMP/tailscale_smoke.sql"
          echo "--- DuckDB output ---"
          "$DUCKDB" :memory: -batch -echo -f "$RUNNER_TEMP/tailscale_smoke.sql"
          echo "=== Headscale nodes after smoke ==="
          export HEADSCALE_CI_ROOT="$GITHUB_WORKSPACE"
          # shellcheck source=scripts/lib/headscale_ci.sh
          source scripts/lib/headscale_ci.sh
          headscale_ci_exec headscale nodes list || true

      - name: Run Headscale QuackTail e2e
        env:
          HEADSCALE_AUTHKEY_FILE: ${{ runner.temp }}/headscale-authkey
          SKIP_HEADSCALE_VERIFY: "1"
          HEADSCALE_ALREADY_RUNNING: "1"
        run: |
          chmod +x scripts/ci_headscale_e2e.sh scripts/lib/headscale_ci.sh scripts/lib/run_e2e_server.py
          ./scripts/ci_headscale_e2e.sh

      - name: Stop Headscale
        if: always()
        run: |
          export HEADSCALE_CI_ROOT="$GITHUB_WORKSPACE"
          # shellcheck source=scripts/lib/headscale_ci.sh
          source scripts/lib/headscale_ci.sh
          headscale_ci_stop

      - name: Upload e2e logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: headscale-e2e-logs
          path: .e2e-work/
          if-no-files-found: warn
